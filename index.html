<!DOCTYPE html>
<html lang="en">
<head>

<title>Memristor Literature Analysis Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>

  body { background: #0a0e17; color: #e2e8f0; font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }

  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #1e293b; color: #22d3ee; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: top; line-height: 1.5; }

</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const papers = [
  { id: "P1", author: "Chua", year: 1971, shortRef: "Chua 1971 (via Chua 2015)", file: "15_02_0319_0368.pdf", title: "Everything You Wish to Know About Memristors But Are Afraid to Ask", claim: "Classifies memristors into Ideal, Generic, and Extended types, rigorously defining fingerprints, non-volatile memory concepts, and DC V-I plots with a novel parametric approach.", type: "Theory/Tutorial", methodology: "Theoretical/Mathematical Analysis", pages: 50 },
  { id: "P2", author: "Chua", year: 2011, shortRef: "Chua 2011", file: "s0033901162649.pdf", title: "Resistance Switching Memories Are Memristors", claim: "All 2-terminal non-volatile resistance switching devices are memristors, regardless of material or mechanism, unified by the pinched hysteresis loop fingerprint.", type: "Theory/Unification", methodology: "Theoretical Analysis + Literature Survey", pages: 19 },
  { id: "P3", author: "Prodromakis, Toumazou & Chua", year: 2012, shortRef: "Prodromakis et al. 2012", file: "Two_centuries_of_memristors.pdf", title: "Two Centuries of Memristors", claim: "Memristive behavior has been experimentally documented for over 200 years across diverse physical systems — from arc discharges to biological ion channels.", type: "Historical Review", methodology: "Historical/Literature Analysis", pages: 4 },
  { id: "P4", author: "Mazumder, Kang & Waser", year: 2012, shortRef: "Mazumder et al. 2012", file: "Memristors_Devices_Models_and_Applicatio.pdf", title: "Memristors: Devices, Models, and Applications (Special Issue Overview)", claim: "Memristor technology spans five domains: theory, device engineering, circuit modeling, digital/analog systems, and neuromorphic systems, with potential to displace CMOS in certain applications.", type: "Survey/Editorial", methodology: "Meta-review of 13 papers", pages: 9 },
  { id: "P5", author: "Di Ventra, Pershin & Chua", year: 2009, shortRef: "Di Ventra et al. 2009", file: "0901_3682v1.pdf", title: "Circuit Elements with Memory: Memristors, Memcapacitors, and Meminductors", claim: "The memory concept extends beyond resistance to capacitance and inductance, defining memcapacitors and meminductors as new circuit elements ubiquitous at the nanoscale.", type: "Theory Extension", methodology: "Theoretical/Mathematical Analysis", pages: 6 },
  { id: "P6", author: "Zidan, Fahmy, Hussain & Salama", year: 2013, shortRef: "Zidan et al. 2013", file: "j_mejo_2012_10_001.pdf", title: "Memristor-Based Memory: The Sneak Paths Problem and Solutions", claim: "The sneak paths problem is the main circuit-level challenge for crossbar memristor memories; a new three-terminal memistor gating technique can solve it.", type: "Circuit Architecture", methodology: "Simulation + Circuit Analysis", pages: 8 },
  { id: "P7", author: "Jeong, Kim, Kim, Choi & Hwang", year: 2016, shortRef: "Jeong et al. 2016", file: "jeong2016.pdf", title: "Memristors for Energy-Efficient New Computing Paradigms", claim: "Memristors enable two energy-saving computing paradigms: stateful logic (merging logic+memory) and neuromorphic computing, potentially closing the 10\u2078\u00d7 energy gap with the brain.", type: "Review", methodology: "Comprehensive Literature Review", pages: 27 },
  { id: "P8", author: "Wang, Cai, Pan et al.", year: 2018, shortRef: "Wang et al. 2018", file: "1801_00530v1.pdf", title: "Robust Memristors Based on Layered Two-Dimensional Materials", claim: "Van der Waals heterostructure memristors (graphene/MoS\u2082\u208b\u2093O\u2093/graphene) achieve record thermal stability up to 340\u00b0C and 10\u2077 endurance cycles via atomically sharp interfaces.", type: "Experimental", methodology: "Device Fabrication + TEM/STEM Characterization", pages: 31 },
  { id: "P9", author: "Sun, Chen & Yan", year: 2020, shortRef: "Sun et al. 2020", file: "sun2020.pdf", title: "The Future of Memristors: Materials Engineering and Neural Networks", claim: "Memristor-based neural networks are the most promising path beyond von Neumann bottlenecks, but material variability and large-scale integration remain unsolved.", type: "Review", methodology: "Comprehensive Literature Review", pages: 33 },
  { id: "P10", author: "Kvatinsky, Ramadan, Friedman & Kolodny", year: 2014, shortRef: "Kvatinsky et al. 2014", file: "publication_8561.pdf", title: "VTEAM \u2014 A General Model for Voltage Controlled Memristors", claim: "The VTEAM model accurately describes voltage-controlled memristors with threshold behavior, achieving <1.5% error while being computationally efficient for SPICE simulations.", type: "Modeling", methodology: "Mathematical Modeling + SPICE Simulation", pages: 6 },
  { id: "P11", author: "Grande de Miguel", year: "~2020", shortRef: "Grande de Miguel (thesis)", file: "document.pdf", title: "Memristor: Funcionamiento y Aplicaciones (Thesis, U. Valladolid)", claim: "Comprehensive undergraduate thesis covering memristor fundamentals, TiO\u2082 models, HP device, applications in cybersecurity (chaotic circuits), neural networks, and non-volatile memories.", type: "Thesis/Survey", methodology: "Literature Review + Simulation (Simulink/LabView)", pages: 74 },
];

const assumptionSets = [
  { name: "Chua's Theoretical Framework", papers: ["P1", "P2", "P3", "P4", "P5"], desc: "Accept the memristor as a fundamental circuit element defined by pinched hysteresis and charge-flux constitutive relations." },
  { name: "HP TiO\u2082 as Reference Implementation", papers: ["P4", "P6", "P10", "P11"], desc: "Use the HP Labs 2008 TiO\u2082 device as the canonical physical memristor for modeling and simulation benchmarks." },
  { name: "Neuromorphic Computing Promise", papers: ["P4", "P7", "P9", "P11"], desc: "Memristors are the most viable hardware substrate for brain-inspired computing, capable of acting as artificial synapses." },
  { name: "Crossbar Architecture Viability", papers: ["P6", "P7", "P9", "P11"], desc: "High-density crossbar arrays are the default architecture for memristor-based memory and computing systems." },
];

const contradictions = [
  { topic: "Is the memristor truly a 'fundamental' circuit element?", side1: { papers: ["P1", "P2", "P5"], position: "Yes \u2014 the memristor completes a symmetry in circuit theory (charge-flux relation). Chua and Di Ventra extend this to memcapacitors and meminductors." }, side2: { papers: ["P4", "P7"], position: "Debatable \u2014 Mazumder and Jeong acknowledge that some researchers view it as a special case of a nonlinear resistor, not a truly independent element." }, reason: "Definitional scope: Chua uses a mathematical symmetry argument; engineers focus on physical realizability." },
  { topic: "What is the dominant switching mechanism?", side1: { papers: ["P8", "P9"], position: "Oxygen vacancy/ion migration in oxide layers is the primary mechanism, with conductive filament formation being a key structural feature." }, side2: { papers: ["P2", "P3"], position: "The mechanism is irrelevant to the memristor identity \u2014 pinched hysteresis is the only required fingerprint. Multiple mechanisms all qualify." }, reason: "Theory vs. engineering: Chua defines memristors by behavior (black-box), while experimentalists need mechanism understanding for optimization." },
  { topic: "Can memristors replace CMOS?", side1: { papers: ["P4", "P7"], position: "Memristors could eventually replace CMOS in memory and certain logic applications, especially through stateful logic and in-memory computing." }, side2: { papers: ["P6", "P9", "P11"], position: "Practical challenges (sneak paths, variability, endurance, yield) mean memristors will complement CMOS rather than replace it." }, reason: "Timeframe and scope: optimistic projections vs. engineering reality of manufacturing at scale." },
  { topic: "Thermal stability and reliability", side1: { papers: ["P8"], position: "2D material-based memristors achieve record thermal stability (340\u00b0C) and 10\u2077 endurance, solving traditional reliability problems." }, side2: { papers: ["P9", "P11"], position: "Material variability, cycle-to-cycle variation, and long-term retention remain unsolved for most memristor technologies." }, reason: "Material specificity: Wang et al. demonstrate a novel 2D heterostructure solution, but it hasn't been validated at manufacturing scale." },
];

const concepts = [
  { name: "Pinched Hysteresis Loop", introduced: "Chua 1971 (P1/P2)", questioned: "Some researchers argued non-crossing loops also qualify", refined: "Chua 2011 (P2) and 2015 (P1) rigorously defined the fingerprint as self-crossing, origin-passing, and frequency-dependent", consensus: "Widely accepted as THE diagnostic signature of a memristor" },
  { name: "Memristive Systems (Generalized Memristor)", introduced: "Chua & Kang 1976 (referenced in P1, P2, P4, P5)", questioned: "Whether ideal memristors exist physically or only generalized ones (P4, P7)", refined: "Di Ventra et al. 2009 (P5) extended to memcapacitors/meminductors; Kvatinsky 2014 (P10) formalized threshold behavior", consensus: "The generalized memristor (state-dependent resistance) is the practical definition; ideal memristors remain theoretical" },
  { name: "Neuromorphic / Synaptic Function", introduced: "Jo et al. 2010, referenced across P4, P7, P9", questioned: "Whether device variability allows reliable synaptic emulation at scale (P9)", refined: "Jeong 2016 (P7) framed memristors within STDP learning; Sun 2020 (P9) reviewed SNN implementations", consensus: "Promising but unproven at system scale \u2014 device-to-device variation is the main barrier" },
];

const gaps = [
  { question: "How to achieve reliable, large-scale manufacturing of memristor crossbar arrays?", why: "Too hard \u2014 requires simultaneous control of material uniformity, interface quality, and CMOS back-end compatibility at nanometer scale.", closest: "Wang et al. 2018 (P8) \u2014 demonstrated atomically sharp interfaces via 2D materials but only at lab scale.", method: "Wafer-scale 2D material transfer + statistical process control + accelerated lifetime testing on >10\u2076 devices." },
  { question: "What is the fundamental physical limit of memristor endurance and retention?", why: "Overlooked \u2014 most papers report empirical numbers without theoretical models predicting ultimate limits.", closest: "Jeong et al. 2016 (P7) \u2014 discussed energy per switching event but not material degradation physics.", method: "Ab initio molecular dynamics of ion migration + accelerated stress testing correlated with atomic-scale imaging." },
  { question: "Can memristor-based neural networks match or exceed digital DNN accuracy?", why: "Too difficult \u2014 requires solving analog noise, weight precision, and programming variability simultaneously.", closest: "Sun et al. 2020 (P9) \u2014 reviewed existing demonstrations but all are small-scale proofs of concept.", method: "Co-design of noise-tolerant algorithms + statistical device models + fabrication of >10\u2074 synapse arrays." },
  { question: "How do different switching mechanisms affect long-term reliability differently?", why: "Too niche \u2014 each group studies their own material system without cross-mechanism comparative studies.", closest: "Chua 2011 (P2) \u2014 catalogued mechanisms but didn't compare their reliability implications.", method: "Standardized reliability test protocol applied across filamentary, interface, and phase-change devices." },
  { question: "Is there a universal compact model that works across all memristor technologies?", why: "Overlooked \u2014 TEAM/VTEAM (P10) work well for specific devices but no single model captures all behaviors.", closest: "Kvatinsky et al. 2014 (P10) \u2014 VTEAM is the most general attempt but still requires per-device fitting.", method: "Physics-informed machine learning model trained on diverse experimental datasets." },
];

const methodAudit = {
  groups: [
    { name: "Theoretical / Mathematical Analysis", papers: ["P1", "P2", "P5"], note: "Dominant in foundational work." },
    { name: "Literature Review / Survey", papers: ["P3", "P4", "P7", "P9", "P11"], note: "Most common methodology overall." },
    { name: "Simulation / Modeling", papers: ["P6", "P10", "P11"], note: "SPICE and MATLAB simulations validate circuit models." },
    { name: "Experimental / Device Fabrication", papers: ["P8"], note: "Only Wang et al. 2018 presents original experimental work." },
    { name: "Meta-analysis / Editorial", papers: ["P4"], note: "Mazumder et al. provide a bird's-eye editorial overview." },
  ],
  dominant: "Literature reviews and theoretical analyses dominate \u2014 reflecting a field still establishing its conceptual foundations.",
  underused: "Experimental comparative studies across different material systems and standardized benchmarking methodologies are notably absent.",
  weakest: "Grande de Miguel thesis (P11) \u2014 relies entirely on secondary sources and basic simulations (Simulink/LabView) without original experimental validation.",
};

const hiddenAssumptions = [
  { assumption: "The pinched hysteresis loop is both necessary AND sufficient to identify a memristor.", dependentPapers: ["P1", "P2"], consequence: "If some non-memristive devices also produce pinched hysteresis, the entire classification framework collapses, and hundreds of 'memristor' papers would need reclassification." },
  { assumption: "Ion migration / oxygen vacancy movement is the universal mechanism in oxide memristors.", dependentPapers: ["P8", "P9"], consequence: "If electronic (not ionic) effects dominate in certain devices, the design rules for electrode selection, forming voltage, and thermal management would be fundamentally different." },
  { assumption: "Crossbar architecture is the optimal topology for memristor-based memory and computing.", dependentPapers: ["P6", "P7"], consequence: "If 3D architectures or non-crossbar topologies prove superior, the entire sneak-path literature (P6) and stateful logic framework (P7) would need rethinking." },
  { assumption: "Biological synapses are well-modeled by memristive behavior.", dependentPapers: ["P7", "P9"], consequence: "If synaptic plasticity involves mechanisms that memristors cannot replicate, the neuromorphic computing promise would be severely limited." },
  { assumption: "Scaling memristors to smaller dimensions will improve performance.", dependentPapers: ["P4", "P8"], consequence: "If quantum effects or surface states introduce new failure modes below ~5nm, the density advantage over CMOS vanishes." },
];

const C = {
  bg: "#0a0e17", card: "#111827", cardHover: "#1a2332", border: "#1e293b",
  accent: "#22d3ee", accentDim: "#0891b2", warn: "#f59e0b", danger: "#ef4444",
  success: "#10b981", text: "#e2e8f0", textDim: "#94a3b8", textMuted: "#64748b",
  purple: "#a78bfa", pink: "#f472b6",
};

const Badge = ({color, children}) => (
  <span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:"11px",fontWeight:600,background:`${color}22`,color,marginRight:6,marginBottom:4}}>{children}</span>
);

const Tag = ({color, children}) => (
  <span style={{display:"inline-block",padding:"3px 10px",borderRadius:12,fontSize:"11px",background:`${color}18`,color,border:`1px solid ${color}33`,marginRight:4,marginBottom:4}}>{children}</span>
);

const Card = ({children, style={}}) => (
  <div style={{background:C.card,borderRadius:10,border:`1px solid ${C.border}`,padding:20,marginBottom:16,...style}}>{children}</div>
);

const SectionTitle = ({children}) => <h2 style={{fontSize:18,fontWeight:700,marginBottom:16,color:"#fff"}}>{children}</h2>;
const SectionDesc = ({children}) => <p style={{fontSize:14,color:C.textDim,marginBottom:20,lineHeight:1.6}}>{children}</p>;
const Label = ({color,children}) => <div style={{fontSize:10,fontWeight:700,color,letterSpacing:"0.8px",marginBottom:4}}>{children}</div>;

const tabDefs = [
  { id: "terrain", label: "1. Terrain Map", icon: "\ud83d\uddfa\ufe0f" },
  { id: "contradictions", label: "2. Contradictions", icon: "\u26a1" },
  { id: "lineage", label: "3. Idea Lineage", icon: "\ud83c\udf33" },
  { id: "gaps", label: "4. Research Gaps", icon: "\ud83d\udd0d" },
  { id: "methods", label: "5. Method Audit", icon: "\ud83d\udd2c" },
  { id: "synthesis", label: "6. Synthesis", icon: "\ud83e\uddec" },
  { id: "assumptions", label: "7. Assumptions", icon: "\ud83d\udca3" },
  { id: "map", label: "8. Knowledge Map", icon: "\ud83c\udfd7\ufe0f" },
  { id: "soWhat", label: "9. So What?", icon: "\ud83c\udfaf" },
];

function TerrainMap() {
  const typeColor = (t) => t.includes("Theory") ? C.purple : t.includes("Review") || t.includes("Survey") ? C.accent : t.includes("Experiment") ? C.success : C.warn;
  return (
    <div>
      <SectionTitle>Paper Inventory \u2014 Author + Year + Main Claim</SectionTitle>
      <SectionDesc>11 papers on memristor technology spanning 2009\u20132020, covering theory, materials, modeling, architecture, and applications.</SectionDesc>
      <div style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>ID</th><th>Reference</th><th>Main Claim</th><th>Type</th><th>Pg</th></tr></thead>
          <tbody>
            {papers.map(p => (
              <tr key={p.id}>
                <td style={{fontWeight:700,color:C.accent,whiteSpace:"nowrap"}}>{p.id}</td>
                <td style={{whiteSpace:"nowrap"}}><strong>{p.author}</strong> ({p.year})</td>
                <td style={{fontSize:"12.5px",maxWidth:500}}>{p.claim}</td>
                <td><Tag color={typeColor(p.type)}>{p.type}</Tag></td>
                <td style={{textAlign:"center"}}>{p.pages}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <h3 style={{fontSize:16,fontWeight:700,marginTop:28,marginBottom:12,color:"#fff"}}>Shared Assumption Clusters</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:12}}>
        {assumptionSets.map((a,i) => (
          <Card key={i} style={{borderLeft:`3px solid ${[C.accent,C.purple,C.success,C.warn][i]}`}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>{a.name}</div>
            <div style={{fontSize:12,color:C.textDim,marginBottom:8}}>{a.desc}</div>
            <div>{a.papers.map(p => <Badge key={p} color={C.accent}>{p}</Badge>)}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function Contradictions() {
  return (
    <div>
      <SectionTitle>Direct Contradictions Across Papers</SectionTitle>
      <SectionDesc>Points where two or more authors directly disagree \u2014 with likely reasons for the divergence.</SectionDesc>
      <div style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Contradiction</th><th style={{color:C.success}}>Position A</th><th style={{color:C.danger}}>Position B</th><th>Why They Diverge</th></tr></thead>
          <tbody>
            {contradictions.map((c,i) => (
              <tr key={i}>
                <td style={{fontWeight:600,color:C.warn,minWidth:180}}>{c.topic}</td>
                <td style={{fontSize:"12px",maxWidth:250}}>
                  <div style={{marginBottom:4}}>{c.side1.papers.map(p => <Badge key={p} color={C.success}>{p}</Badge>)}</div>
                  {c.side1.position}
                </td>
                <td style={{fontSize:"12px",maxWidth:250}}>
                  <div style={{marginBottom:4}}>{c.side2.papers.map(p => <Badge key={p} color={C.danger}>{p}</Badge>)}</div>
                  {c.side2.position}
                </td>
                <td style={{fontSize:"12px",color:C.textDim,fontStyle:"italic"}}>{c.reason}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function IdeaLineage() {
  return (
    <div>
      <SectionTitle>Intellectual Lineage \u2014 Three Core Concepts</SectionTitle>
      <SectionDesc>Who introduced it, who questioned it, who refined it, and where consensus stands today.</SectionDesc>
      {concepts.map((c,i) => (
        <Card key={i} style={{position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,width:4,height:"100%",background:[C.accent,C.purple,C.success][i]}}/>
          <div style={{paddingLeft:12}}>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:12,color:[C.accent,C.purple,C.success][i]}}>{c.name}</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16}}>
              {[{l:"INTRODUCED BY",v:c.introduced,cl:C.accent},{l:"QUESTIONED BY",v:c.questioned,cl:C.warn},{l:"REFINED BY",v:c.refined,cl:C.purple},{l:"CURRENT CONSENSUS",v:c.consensus,cl:C.success}].map((item,j) => (
                <div key={j}><Label color={item.cl}>{item.l}</Label><div style={{fontSize:13,color:C.textDim,lineHeight:1.5}}>{item.v}</div></div>
              ))}
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

function ResearchGaps() {
  return (
    <div>
      <SectionTitle>5 Unanswered Research Questions</SectionTitle>
      <SectionDesc>The most important questions nobody in this literature has fully answered yet.</SectionDesc>
      {gaps.map((g,i) => (
        <Card key={i} style={{borderLeft:`3px solid ${C.warn}`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
            <div style={{fontSize:24,fontWeight:800,color:C.warn,minWidth:32}}>#{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:10,color:"#fff"}}>{g.question}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:12}}>
                <div><Label color={C.danger}>WHY IT EXISTS</Label><div style={{fontSize:12.5,color:C.textDim,lineHeight:1.5}}>{g.why}</div></div>
                <div><Label color={C.accent}>CLOSEST PAPER</Label><div style={{fontSize:12.5,color:C.textDim,lineHeight:1.5}}>{g.closest}</div></div>
                <div><Label color={C.success}>METHODOLOGY NEEDED</Label><div style={{fontSize:12.5,color:C.textDim,lineHeight:1.5}}>{g.method}</div></div>
              </div>
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

function MethodAuditPanel() {
  return (
    <div>
      <SectionTitle>Methodological Audit</SectionTitle>
      <SectionDesc>How research methods distribute across this literature \u2014 and what's missing.</SectionDesc>
      {methodAudit.groups.map((g,i) => (
        <Card key={i} style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div style={{minWidth:200}}>
            <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{g.name}</div>
            <div style={{marginTop:6}}>{g.papers.map(p => <Badge key={p} color={C.accent}>{p}</Badge>)}</div>
          </div>
          <div style={{flex:1,minWidth:120,height:8,background:C.border,borderRadius:4,overflow:"hidden"}}>
            <div style={{width:`${(g.papers.length/11)*100}%`,height:"100%",background:`linear-gradient(90deg, ${C.accent}, ${C.purple})`,borderRadius:4}}/>
          </div>
          <div style={{fontSize:12,color:C.textDim,minWidth:30,textAlign:"right"}}>{g.papers.length}/11</div>
        </Card>
      ))}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(250px, 1fr))",gap:12,marginTop:20}}>
        {[{title:"DOMINANT METHOD",text:methodAudit.dominant,color:C.accent},{title:"UNDERUSED METHOD",text:methodAudit.underused,color:C.warn},{title:"WEAKEST METHODOLOGY",text:methodAudit.weakest,color:C.danger}].map((item,i) => (
          <Card key={i} style={{borderTop:`3px solid ${item.color}`}}>
            <Label color={item.color}>{item.title}</Label>
            <div style={{fontSize:13,color:C.textDim,lineHeight:1.5,marginTop:6}}>{item.text}</div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function Synthesis() {
  const sections = [
    {label:"WHAT THE FIELD COLLECTIVELY BELIEVES",color:C.success,text:"The memristor is a legitimate circuit element whose defining signature \u2014 the pinched hysteresis loop \u2014 has been observed across dozens of material systems spanning two centuries. Since HP's 2008 TiO\u2082 demonstration, the community accepts that all two-terminal non-volatile resistance switching devices are memristive, regardless of material or mechanism. The field broadly agrees that memristors' most transformative potential lies in two directions: ultra-dense non-volatile memory and neuromorphic computing hardware that could close the enormous energy gap between silicon processors and biological brains. Crossbar arrays are the consensus architecture for both memory and computation applications."},
    {label:"WHAT REMAINS IN DISPUTE",color:C.warn,text:"Whether the ideal memristor (Chua's charge-flux element) exists physically or whether all real devices are generalized memristive systems remains an active theoretical debate. The relative importance of different switching mechanisms \u2014 filamentary vs. interface-type vs. phase-change \u2014 for practical applications is unresolved. Whether memristors will complement or eventually displace CMOS is contentious: optimists envision stateful logic eliminating the von Neumann bottleneck entirely, while pragmatists point to unsolved manufacturing challenges. The neuromorphic promise is debated in terms of scalability."},
    {label:"PROVEN BEYOND REASONABLE DOUBT",color:C.accent,text:"The pinched hysteresis fingerprint is a robust, experimentally repeatable phenomenon. Nanoscale oxide-based devices can switch between resistance states with endurance up to 10\u2077 cycles. The memory concept extends beyond resistance to capacitance and inductance. 2D material heterostructures can dramatically improve thermal stability compared to conventional oxide memristors. Compact models (TEAM/VTEAM) can accurately simulate device behavior in circuit-level tools."},
    {label:"THE MOST IMPORTANT UNANSWERED QUESTION",color:C.danger,text:"Can memristor-based neural network hardware actually outperform conventional digital accelerators (GPUs/TPUs) in real-world tasks when accounting for device variability, programming overhead, and manufacturing yield \u2014 or will the analog noise floor permanently cap their practical utility?"},
  ];
  return (
    <div>
      <SectionTitle>Master Synthesis \u2014 400 Words, No Filler</SectionTitle>
      <SectionDesc>What this field collectively believes, disputes, has proven, and still cannot answer.</SectionDesc>
      <Card style={{lineHeight:1.8,fontSize:14}}>
        {sections.map((s,i) => (
          <div key={i} style={{marginBottom:i<sections.length-1?16:0}}>
            <Label color={s.color}>{s.label}</Label>
            <p style={{color:C.textDim,marginTop:6}}>{s.text}</p>
          </div>
        ))}
      </Card>
    </div>
  );
}

function AssumptionKiller() {
  return (
    <div>
      <SectionTitle>Hidden Assumptions \u2014 Never Proven, Widely Assumed</SectionTitle>
      <SectionDesc>These are the beliefs most papers share but never explicitly justify. If any of them are wrong, the field shifts.</SectionDesc>
      {hiddenAssumptions.map((a,i) => (
        <Card key={i} style={{borderLeft:`3px solid ${C.danger}`}}>
          <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:8}}>"{a.assumption}"</div>
          <div style={{marginBottom:8}}>{a.dependentPapers.map(p => <Badge key={p} color={C.pink}>{p}</Badge>)}</div>
          <div style={{fontSize:12,color:C.textDim,lineHeight:1.6}}>
            <span style={{color:C.danger,fontWeight:600}}>If wrong: </span>{a.consequence}
          </div>
        </Card>
      ))}
    </div>
  );
}

function KnowledgeMap() {
  const pillars = ["Pinched hysteresis is the universal memristor fingerprint (P1, P2, P3)","Nanoscale oxide devices exhibit reliable resistive switching (P4, P8)","Memory extends to capacitance & inductance \u2014 memcapacitors/meminductors (P5)","Compact models (TEAM/VTEAM) enable accurate circuit simulation (P10)","Crossbar architectures achieve ultra-high density (P6, P7)"];
  const disputes = ["Ideal vs. generalized memristor: does the pure charge-flux element exist physically? (P1 vs P4, P7)","CMOS replacement vs. complement: will memristors displace or augment transistors? (P4, P7 vs P6, P9)","Mechanism relevance: does the switching physics matter for the memristor identity? (P2 vs P8, P9)"];
  const frontiers = ["Can memristor neural networks outperform GPUs at real-world scale?","What are the fundamental physical limits of memristor endurance and retention?"];
  const mustRead = [
    {ref:"Chua 2011 (P2)",why:"The definitive argument that all resistance switching = memristors. Establishes the fingerprint framework."},
    {ref:"Jeong et al. 2016 (P7)",why:"Best single-paper overview of memristors in both von Neumann and neuromorphic paradigms."},
    {ref:"Sun et al. 2020 (P9)",why:"Most recent and comprehensive review of materials, mechanisms, and neural network applications."},
  ];
  return (
    <div>
      <SectionTitle>Structured Knowledge Map</SectionTitle>
      <SectionDesc>The architecture of this field in one view. Print this.</SectionDesc>
      <Card style={{padding:24}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"inline-block",padding:"12px 28px",background:`${C.accent}22`,border:`2px solid ${C.accent}`,borderRadius:8,fontSize:15,fontWeight:800,color:C.accent,maxWidth:700}}>
            CENTRAL CLAIM: The memristor is a real, distinct circuit element with unique potential for memory and brain-like computing
          </div>
        </div>
        <Label color={C.success}>SUPPORTING PILLARS (Well-Established)</Label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:10,margin:"10px 0 20px"}}>
          {pillars.map((p,i) => <div key={i} style={{padding:"10px 14px",background:`${C.success}12`,border:`1px solid ${C.success}33`,borderRadius:6,fontSize:12.5,lineHeight:1.5,color:C.textDim}}><span style={{color:C.success,fontWeight:700}}>\u2713 </span>{p}</div>)}
        </div>
        <Label color={C.warn}>DISPUTED ZONES (Active Debates)</Label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(250px, 1fr))",gap:10,margin:"10px 0 20px"}}>
          {disputes.map((d,i) => <div key={i} style={{padding:"10px 14px",background:`${C.warn}12`,border:`1px solid ${C.warn}33`,borderRadius:6,fontSize:12.5,lineHeight:1.5,color:C.textDim}}><span style={{color:C.warn,fontWeight:700}}>\u26a1 </span>{d}</div>)}
        </div>
        <Label color={C.purple}>FRONTIER QUESTIONS (Nobody Has Solved)</Label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:10,margin:"10px 0 24px"}}>
          {frontiers.map((q,i) => <div key={i} style={{padding:"10px 14px",background:`${C.purple}12`,border:`1px solid ${C.purple}33`,borderRadius:6,fontSize:12.5,lineHeight:1.5,color:C.textDim}}><span style={{color:C.purple,fontWeight:700}}>? </span>{q}</div>)}
        </div>
        <Label color={C.pink}>MUST-READ PAPERS FOR NEWCOMERS</Label>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))",gap:10,marginTop:10}}>
          {mustRead.map((r,i) => (
            <div key={i} style={{padding:"12px 14px",background:`${C.pink}12`,border:`1px solid ${C.pink}33`,borderRadius:6}}>
              <div style={{fontSize:14,fontWeight:700,color:C.pink,marginBottom:4}}>{i+1}. {r.ref}</div>
              <div style={{fontSize:12,color:C.textDim,lineHeight:1.5}}>{r.why}</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function SoWhat() {
  return (
    <div>
      <SectionTitle>The "So What?" Test</SectionTitle>
      <SectionDesc>Explain this entire body of research to an intelligent non-expert in 5 minutes.</SectionDesc>
      <div style={{display:"grid",gap:16}}>
        <Card style={{borderLeft:`4px solid ${C.accent}`,padding:24}}>
          <Label color={C.accent}>ONE-SENTENCE VERSION</Label>
          <div style={{fontSize:19,fontWeight:700,color:"#fff",lineHeight:1.5,marginTop:8}}>
            Scientists have discovered that certain nanoscale materials can "remember" the electrical signals that pass through them \u2014 and this property, predicted theoretically in 1971 and physically demonstrated in 2008, could fundamentally change how we build computer memory and create hardware that works like the human brain.
          </div>
        </Card>
        <Card style={{borderLeft:`4px solid ${C.warn}`,padding:24}}>
          <Label color={C.warn}>HONEST ADMISSION</Label>
          <div style={{fontSize:15,color:C.textDim,lineHeight:1.6,marginTop:8}}>
            We still don't know if memristor-based brain-like computers will actually work better than the powerful GPU chips already running today's AI. The devices are noisy, hard to manufacture consistently, and nobody has built a large enough system to prove the theoretical advantages hold in practice.
          </div>
        </Card>
        <Card style={{borderLeft:`4px solid ${C.success}`,padding:24}}>
          <Label color={C.success}>THE ONE REAL-WORLD IMPLICATION THAT MATTERS MOST</Label>
          <div style={{fontSize:15,color:C.textDim,lineHeight:1.6,marginTop:8}}>
            If memristor-based computing works at scale, it would slash the energy consumption of AI and data centers by orders of magnitude \u2014 addressing one of the most urgent technological challenges of our time: the unsustainable power demands of modern computation. The human brain does with 20 Watts what currently requires megawatts of silicon.
          </div>
        </Card>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState("terrain");
  const panels = {terrain:TerrainMap,contradictions:Contradictions,lineage:IdeaLineage,gaps:ResearchGaps,methods:MethodAuditPanel,synthesis:Synthesis,assumptions:AssumptionKiller,map:KnowledgeMap,soWhat:SoWhat};
  const Panel = panels[activeTab];
  return (
    <div style={{minHeight:"100vh"}}>
      <div style={{padding:"28px 32px 0",borderBottom:`1px solid ${C.border}`}}>
        <h1 style={{fontSize:26,fontWeight:700,letterSpacing:"-0.5px",color:"#fff"}}>Memristor Literature Analysis Dashboard</h1>
        <p style={{fontSize:13,color:C.textDim,marginTop:4,marginBottom:16}}>Systematic analysis of 11 papers \u00b7 9-prompt deep analysis protocol \u00b7 All content in English</p>
        <div style={{display:"flex",gap:0,overflowX:"auto",paddingBottom:0}}>
          {tabDefs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)}
              style={{padding:"10px 16px",fontSize:12,fontWeight:activeTab===t.id?600:400,color:activeTab===t.id?C.accent:C.textMuted,background:"transparent",border:"none",borderBottom:activeTab===t.id?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.2s",fontFamily:"inherit"}}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"24px 32px"}}><Panel/></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
